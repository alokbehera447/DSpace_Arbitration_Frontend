<header class="custom-header">

    <!-- TOP BAR -->
    <div class="header-top-bar">
        <div class="container-fluid px-4">

            <div class="header-main-row">

                <!-- LEFT : LOGO + TITLE -->
                <a class="header-brand" routerLink="/home">

                    <div class="header-logo-wrapper">
                        <img src="assets/custom/images/channels4_profile.jpg" alt="High Court of Orissa"
                            class="header-logo" />
                    </div>

                    <div class="header-brand-text">
                        <span class="header-title">
                            High Court of Orissa
                        </span>

                        <span class="header-subtitle">
                            DIGITAL JUDICIAL REPOSITORY
                        </span>
                    </div>

                </a>

                <!-- CENTER TAGLINE -->
                <div class="header-center d-none d-lg-flex">

                    <div class="header-tagline">

                        <span class="tagline-top">
                            Serving Justice with Integrity
                        </span>

                        <span class="tagline-bottom">
                            Digital • Transparent • Accessible
                        </span>

                    </div>

                </div>

                <!-- RIGHT ICONS -->
                <div class="header-right">

                    <nav role="navigation" class="header-nav-icons navbar navbar-expand-md px-0">

                        <ds-search-navbar></ds-search-navbar>

                        <ds-lang-switch></ds-lang-switch>

                        <ds-context-help-toggle></ds-context-help-toggle>

                        <ds-auth-nav-menu></ds-auth-nav-menu>

                        <ds-impersonate-navbar></ds-impersonate-navbar>

                        <div *ngIf="isMobile$ | async" class="ps-2">

                            <button class="navbar-toggler px-0" type="button" (click)="toggleNavbar()"
                                aria-controls="collapsingNav" aria-expanded="false"
                                [attr.aria-label]="'nav.toggle' | translate">

                                <span class="fas fa-bars fa-fw toggler-icon" aria-hidden="true"></span>

                            </button>

                        </div>

                    </nav>

                </div>

            </div>

        </div>
    </div>

    <!-- GOLD LINE -->
    <div class="header-gold-line"></div>

</header>
