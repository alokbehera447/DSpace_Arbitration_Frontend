<div class="user-list-container">
  <h2>User Audit Log Summary</h2>
  
  <!-- ADD THIS LOADING CHECK -->
  <div *ngIf="!users || users.length === 0">
    <p style="color: #007bff; padding: 20px; text-align: center;">
      Loading user data...
    </p>
  </div>
  
  <!-- SHOW TABLE ONLY WHEN DATA EXISTS -->
  <table *ngIf="users && users.length > 0">
    <thead>
      <tr>
        <th>Email</th>
        <th>Last Login</th>
        <th>Last Logout</th>
        <th>Duration</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let user of users" (click)="goToDetails(user.userId)">
        <td><a>{{ user.email }}</a></td>
        <td>{{ user.loginTime | date:'short' }}</td>
        <td>{{ user.logoutTime | date:'short' }}</td>
        <td>{{ user.duration | duration }}</td>
      </tr>
    </tbody>
  </table>
</div>
