<h2>User PDF passwords</h2>

<div *ngIf="loading">Loading...</div>

<table class="table table-striped table-sm" *ngIf="!loading">
  <thead>
    <tr>
      <th>Email</th>
      <th>First name</th>
      <th>Last name</th>
      <th>PDF password</th>
    </tr>
  </thead>
  <tbody>
    <tr *ngFor="let u of rows">
      <td>{{ u.email }}</td>
      <td>{{ u.firstName }}</td>
      <td>{{ u.lastName }}</td>
      <td>{{ u.pdfPassword }}</td>
    </tr>
  </tbody>
</table>
