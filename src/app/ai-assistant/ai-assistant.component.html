<div class="ai-wrapper" *ngIf="isLoggedIn">

  <!-- Floating Button -->
  <div class="robot-container" *ngIf="!isOpen" (click)="toggleChat()">
    <img src="assets/images/chatbot.png">
  </div>

  <!-- Chat Window -->
  <div class="chat-container" [ngClass]="{ 'expanded': isExpanded }" *ngIf="isOpen">

    <div class="chat-box">

      <!-- SIDEBAR -->
      <div class="chat-sidebar">

        <!-- New Chat -->
        <button class="new-chat-btn" (click)="startNewChat()">
          + New Chat
        </button>

        <!--  DROPDOWN HEADER -->
        <!-- <div class="history-header" (click)="showHistory = !showHistory"> -->
        <div class="history-header" (click)="toggleHistory()">
          <span>Past Conversations</span>
          <span>{{ showHistory ? '▼' : '▶' }}</span>
        </div>

        <!--  DROPDOWN LIST -->
        <div class="sidebar-list" *ngIf="showHistory">

          <div *ngIf="sessions.length === 0" class="sidebar-empty">
            No chats yet
          </div>

          <div *ngFor="let s of sessions" class="sidebar-item" [class.active]="s.id === sessionId">

            <!-- CLICK TO OPEN -->
            <!-- <div class="chat-info" (click)="selectSession(s.id)"> -->
            <div class="chat-info" (click)="selectSession(s.id); activeMenu = null">
              <div class="chat-title">
                <!-- {{ s.title || ('Chat ' + (s.id | slice:0:6)) }} -->
                {{ s.firstMessage ? (s.firstMessage | slice:0:40) : 'New Chat' }}

              </div>

              <div class="chat-time">
                {{ s.createdAt | date:'short' }}
              </div>

            </div>

            <!--  DELETE BUTTON -->
            <!-- <button class="delete-btn" (click)="deleteSession(s.id, $event)">
              ✕
            </button> -->
            <div class="menu-wrapper" (click)="$event.stopPropagation()">

              <!-- 3 dots -->
              <button class="menu-btn" (click)="toggleMenu(s.id); $event.stopPropagation()">
                ⋮
              </button>

              <!-- dropdown (ONLY DELETE) -->
              <div class="menu-dropdown" *ngIf="activeMenu === s.id">

                <!-- <div class="menu-item delete" (click)="deleteSession(s.id, $event)">
                🗑 Delete
              </div> -->
                <div class="menu-item delete" (click)="deleteSession(s.id, $event)">
                  <span class="icon">🗑</span>
                  <span>Delete</span>
                </div>

              </div>

            </div>

          </div>

        </div>

      </div>

      <!-- MAIN CHAT -->
      <div class="chat-main">

        <!-- HEADER -->
        <div class="chat-header">
          <span>Orissa High Court AI Assistant</span>

          <div class="header-actions">
            <button (click)="toggleExpand()">⛶</button>
            <button (click)="toggleChat()">✕</button>
          </div>
        </div>

        <!-- MESSAGES -->
        <div class="chat-body">

          <div *ngFor="let msg of messages" [ngClass]="msg.type === 'user' ? 'user-message' : 'bot-message'">

            <!-- {{ msg.text }} -->
            <div [innerHTML]="formatMessage(msg.text)"></div>

          </div>

          <div *ngIf="loading" class="bot-message typing">
            Searching...
          </div>

        </div>

        <!-- INPUT -->
        <div class="chat-input">
          <div class="search-wrapper">
            <input [(ngModel)]="userMessage" (keydown.enter)="sendMessage(); $event.preventDefault()"
              placeholder="Ask something..." />

            <button (click)="sendMessage()">→</button>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>
