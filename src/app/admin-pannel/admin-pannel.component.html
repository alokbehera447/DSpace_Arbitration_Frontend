<div class="watermark-page container-fluid py-4">
  <div class="page-header mb-4">
    <h2>Watermark Management</h2>
    <p class="text-muted">
      Manage the default watermark used across the system
    </p>
  </div>

  <div class="row g-4">
    <!-- CURRENT WATERMARK -->
    <div class="col-lg-6">
      <div class="card watermark-card h-100">
        <div class="card-header">
          <span>Current Watermark</span>
        </div>

        <div class="card-body d-flex align-items-center justify-content-center">
          <ng-container *ngIf="imgUrl; else empty">
            <div class="preview-wrapper">
              <img
                [src]="imgUrl"
                alt="Current Watermark"
                class="watermark-preview"
              />
              <span class="badge bg-success mt-3">Active</span>
            </div>
          </ng-container>

          <ng-template #empty>
            <div class="empty-state text-center">
              <i class="bi bi-image"></i>
              <h6>No watermark uploaded</h6>
              <p>
                Upload an image to apply it as the default watermark
              </p>
            </div>
          </ng-template>
        </div>
      </div>
    </div>

    <!-- UPLOAD WATERMARK -->
    <div class="col-lg-6">
      <div class="card watermark-card h-100">
        <div class="card-header">
          <span>Upload New Watermark</span>
        </div>

        <div class="card-body">
          <label
            class="dropzone"
            (dragover)="onDragOver($event)"
            (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)"
            [class.drag-over]="isDragOver"
          >
            <input type="file" accept="image/*" (change)="onPick($event)" />

            <div class="dropzone-content">
              <i class="bi bi-cloud-arrow-up"></i>
              <h6>Drag & Drop image here</h6>
              <span>or click to browse</span>
            </div>
          </label>

          <!-- PROGRESS -->
          <div *ngIf="progress >= 0" class="mt-4">
            <div class="progress">
              <div
                class="progress-bar progress-bar-striped progress-bar-animated"
                [style.width.%]="progress"
              >
                {{ progress }}%
              </div>
            </div>
          </div>

          <div class="hint-text mt-3">
            Supported formats: PNG, JPG, WEBP<br />
            Recommended: Transparent PNG
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
