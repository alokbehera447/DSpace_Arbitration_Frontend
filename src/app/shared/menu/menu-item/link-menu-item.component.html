<a class="ds-menu-item" role="menuitem" [ngClass]="{ 'disabled': !hasLink || item.disabled }"
   [attr.aria-disabled]="!hasLink || item.disabled" [attr.data-test]="'link-menu-item.'+item.text"
   [routerLink]="getRouterLink()" [queryParams]="item.queryParams" (click)="$event.stopPropagation()"
   (keyup.space)="navigate($event)" (keydown.enter)="navigate($event)" href="javascript:void(0);"><ng-container
      [ngSwitch]="item.text">
      <i *ngSwitchCase="'menu.section.browse_global_by_title'" class="ti ti-file-description" aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_case_type'" class="ti ti-gavel" aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_case_number'" class="ti ti-users" aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_judge_name'" class="ti ti-calendar-event"
         aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_party_firstpetitioner'" class="ti ti-align-left"
         aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_party_firstrespondent'" class="ti ti-video"
         aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_advocate_firstpetitioner'" class="ti ti-code"
         aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_advocate_firstrespondent'" class="ti ti-regex"
         aria-hidden="true"></i>
      <i *ngSwitchCase="'menu.section.browse_global_by_dc_case_disposaldate'" class="ti ti-sparkles"
         aria-hidden="true"></i>
   </ng-container>{{item.text | translate}}</a>
