<div class="video-search-container">

  <h2>Search Case Transcript</h2>

  <div class="input-group mb-3">
    <input
      type="text"
      class="form-control"
      [formControl]="transcriptControl"
      placeholder="Search transcript..."
      (keyup.enter)="onSearchClick()"
    />
    <button class="btn btn-primary" (click)="onSearchClick()">
      Search
    </button>
  </div>

  <div *ngIf="loading" class="text-center">Loading...</div>

  <div *ngIf="(caseList$ | async)?.length === 0 && transcriptControl.value">
    No cases found.
  </div>

  <div *ngFor="let caseItem of caseList$ | async" class="case-card">

    <h5>Case Details</h5>

    <p><strong>Case Number:</strong> {{ caseItem.caseNumber }}</p>
    <p><strong>Case Type:</strong> {{ caseItem.caseType }}</p>
    <p><strong>Case Year:</strong> {{ caseItem.caseYear }}</p>

    <div class="mt-3">
      <a
        [href]="caseItem.itemUrl"
        target="_blank"
        class="btn btn-outline-primary me-2"
      >
        View Item
      </a>

      <a
        *ngIf="caseItem.videoUrl"
        [href]="caseItem.videoUrl"
        target="_blank"
        class="btn btn-primary"
      >
        View Video
      </a>
    </div>

  </div>

</div>
